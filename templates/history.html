<!DOCTYPE html>
<html>
<head>
    <title>History</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4ff; min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 550px; margin: 0 auto; }
        h1 { font-size: 28px; font-weight: 700; color: #1e1b4b; margin-bottom: 4px; }
        .back { font-size: 13px; color: #6366f1; text-decoration: none; display: inline-block; margin-bottom: 24px; }
        .day-card { background: white; border-radius: 16px; padding: 18px 22px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 12px rgba(99,102,241,0.06); }
        .day-date { font-size: 15px; font-weight: 600; color: #374151; }
        .day-stats { font-size: 13px; color: #9ca3af; margin-top: 3px; }
        .day-percent { font-size: 22px; font-weight: 700; color: #6366f1; }
        .empty { text-align: center; color: #c7d2fe; padding: 50px 0; font-size: 15px; }
    </style>
</head>
<body>
<div class="container">
    <h1>History</h1>
    <a href="/" class="back">← Wapas jaao</a>
    {% if history %}
        {% for day in history %}
        <div class="day-card">
            <div>
                <p class="day-date">{{ day[0] }}</p>
                <p class="day-stats">{{ day[2] }}/{{ day[1] }} habits complete</p>
            </div>
            <span class="day-percent">{{ ((day[2] / day[1]) * 100) | round | int }}%</span>
        </div>
        {% endfor %}
    {% else %}
        <div class="empty">Abhi koi history nahi hai!</div>
    {% endif %}
</div>
</body>
</html>
